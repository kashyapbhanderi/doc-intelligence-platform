# prometheus.yml
# Prometheus scrape configuration.
# Tells Prometheus WHERE to collect metrics from.

global:
  scrape_interval:     15s   # collect every 15 seconds
  evaluation_interval: 15s

scrape_configs:

  # Scrape the FastAPI app
  - job_name: 'doc-intelligence-api'
    static_configs:
      - targets: ['api:8000']    # 'api' = Docker service name
    metrics_path: '/metrics'

  # Scrape Prometheus itself (standard practice)
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']