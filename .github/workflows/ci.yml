name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf langchain langchain-text-splitters
          pip install openai python-dotenv tqdm pytest

      - name: Run tests
        run: |
          pytest tests/ -v --ignore=tests/test_search.py --ignore=tests/test_embedder.py --ignore=tests/test_query_engine.py --ignore=tests/test_reembed.py
        env:
          PYTHONPATH: .

      - name: Show test summary
        if: always()
        run: |
          echo "CI pipeline finished"